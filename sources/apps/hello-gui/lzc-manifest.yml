application:
  subdomain: hello-gui
  routes:
    - /=http://app.cloud.lazycat.app.hello-gui.lzcapp:80

services:
  app:
    image: nginx:1.27-alpine
    command:
      - /bin/sh
      - -c
      - |
        cat > /usr/share/nginx/html/index.html <<'EOF'
        <!doctype html>
        <html lang="en">
        <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Hello GUI</title>
          <style>
            body {
              margin: 0;
              min-height: 100vh;
              display: grid;
              place-items: center;
              font-family: system-ui, sans-serif;
              color: #172033;
              background: #f7f8fb;
            }
            main {
              width: min(420px, calc(100vw - 32px));
              padding: 28px;
              border: 1px solid #d9dee8;
              border-radius: 8px;
              background: #ffffff;
              box-shadow: 0 12px 32px rgba(23, 32, 51, 0.08);
            }
            h1 {
              margin: 0 0 12px;
              font-size: 28px;
            }
            p {
              margin: 0 0 20px;
              line-height: 1.5;
              color: #4b5565;
            }
            button {
              width: 100%;
              height: 44px;
              border: 0;
              border-radius: 6px;
              color: #ffffff;
              background: #2563eb;
              font: inherit;
              cursor: pointer;
            }
          </style>
        </head>
        <body>
          <main>
            <h1>Hello GUI</h1>
            <p>This is the smallest GUI app in this LUR source repository.</p>
            <button
              type="button"
              onclick="this.textContent = new Date().toLocaleString()"
            >
              Show current time
            </button>
          </main>
        </body>
        </html>
        EOF
        nginx -g 'daemon off;'
